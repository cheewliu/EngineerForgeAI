<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="52%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <!-- Horizontal gradient for "Forge" wordmark text -->
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (48×48) ── -->
  <polygon points="16.5,11 31.5,11 39,24 31.5,37 16.5,37 9,24" fill="url(#g)"/>
  <rect x="21" y="6"  width="6" height="5" rx="1.5" fill="url(#g)"/>
  <rect x="21" y="6"  width="6" height="5" rx="1.5" fill="url(#g)" transform="rotate(60,24,24)"/>
  <rect x="21" y="6"  width="6" height="5" rx="1.5" fill="url(#g)" transform="rotate(120,24,24)"/>
  <rect x="21" y="6"  width="6" height="5" rx="1.5" fill="url(#g)" transform="rotate(180,24,24)"/>
  <rect x="21" y="6"  width="6" height="5" rx="1.5" fill="url(#g)" transform="rotate(240,24,24)"/>
  <rect x="21" y="6"  width="6" height="5" rx="1.5" fill="url(#g)" transform="rotate(300,24,24)"/>
  <circle cx="24" cy="24" r="8" fill="#09090b" opacity="0.55"/>
  <text x="24" y="27.5" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="8.5" font-weight="800"
        fill="white" letter-spacing="0.8">AI</text>

  <!-- ── Wordmark ── -->
  <!-- "Engineer" — light weight, soft white -->
  <text x="60" y="31"
        font-family="Inter,system-ui,-apple-system,sans-serif"
        font-size="19" font-weight="300"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="-0.3">Engineer</text>

  <!-- "Forge" — black weight, gradient -->
  <text x="148" y="31"
        font-family="Inter,system-ui,-apple-system,sans-serif"
        font-size="19" font-weight="900"
        fill="url(#tg)"
        letter-spacing="-0.5">Forge</text>

  <!-- "AI" — small superscript, violet -->
  <text x="210" y="22"
        font-family="Inter,system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="600"
        fill="#8b5cf6"
        letter-spacing="1">AI</text>
</svg>
